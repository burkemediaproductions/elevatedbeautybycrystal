<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elevated Beauty By Crystal</title>
  <meta name="description" content="Elevated Beauty By Crystal is preparing something beautiful. Follow along on Instagram, Facebook, TikTok, and YouTube.">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#efe7dc">
  <link rel="icon" href="/assets/img/logo-minimal.png" type="image/png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Elevated Beauty By Crystal">
  <meta property="og:description" content="Elevated Beauty By Crystal is preparing something beautiful. Follow along on social media.">
  <meta property="og:image" content="/assets/img/logo-lace.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    :root {
      --cream: #efe7dc;
      --cream-soft: #f8f3ed;
      --black: #080604;
      --gold: #c79500;
      --muted: #6f6257;
      --card: rgba(255, 250, 244, 0.82);
      --shadow: 0 28px 80px rgba(28, 20, 14, 0.18);
      --display: "Didot", "Bodoni 72", "Bodoni MT", Georgia, serif;
      --body: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: var(--body);
      color: var(--black);
      background:
        radial-gradient(circle at top left, rgba(199, 149, 0, 0.18), transparent 32rem),
        linear-gradient(135deg, rgba(255,250,244,.92), rgba(239,231,220,.88)),
        url('/assets/img/logo-lace.jpg') center/cover fixed no-repeat,
        var(--cream);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      width: min(760px, 100%);
      text-align: center;
      background: var(--card);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: clamp(2rem, 6vw, 4.25rem);
      backdrop-filter: blur(16px);
    }
    .logo {
      width: min(430px, 88%);
      margin: 0 auto 1.4rem;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,.08));
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: .85rem;
      color: var(--gold);
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: .78rem;
    }
    h1 {
      font-family: var(--display);
      font-size: clamp(2.2rem, 8vw, 4.6rem);
      line-height: 1.02;
      margin: 0 0 1rem;
      letter-spacing: .01em;
    }
    p {
      max-width: 560px;
      margin: 0 auto 1.6rem;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.7;
    }
    .socials {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .85rem;
      margin-top: 1.5rem;
    }
    .socials a {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--black);
      border: 1px solid rgba(0,0,0,.12);
      box-shadow: 0 12px 30px rgba(0,0,0,.16);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .socials a:hover,
    .socials a:focus-visible {
      transform: translateY(-3px);
      background: #211a15;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
      outline: none;
    }
    .socials img {
      width: 26px;
      height: 26px;
      filter: invert(1);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .note {
      margin-top: 1.75rem;
      font-size: .92rem;
      color: rgba(8,6,4,.62);
    }
    @media (max-width: 560px) {
      body { padding: 1rem; }
      main { border-radius: 28px; }
      .socials a { width: 54px; height: 54px; }
    }
  </style>
</head>
<body>
  <main aria-label="Elevated Beauty By Crystal temporary landing page">
    <img class="logo" src="/assets/img/logo-minimal.png" alt="Elevated Beauty By Crystal">
    <span class="eyebrow">Website coming soon</span>
    <h1>Something beautiful is on the way.</h1>
    <p>Elevated Beauty By Crystal is preparing a refreshed online experience. Follow along on social media for updates, services, and availability.</p>
    <nav class="socials" aria-label="Social media links">
      <a href="https://www.instagram.com/elevatedbeautybycrystal" target="_blank" rel="noopener" aria-label="Instagram"><img src="/assets/icons/instagram.svg" alt="" aria-hidden="true"><span class="sr-only">Instagram</span></a>
      <a href="https://www.facebook.com/ElevatedBeautyByCrystal" target="_blank" rel="noopener" aria-label="Facebook"><img src="/assets/icons/facebook.svg" alt="" aria-hidden="true"><span class="sr-only">Facebook</span></a>
      <a href="https://www.tiktok.com/@elevatedbeautybycrystal" target="_blank" rel="noopener" aria-label="TikTok"><img src="/assets/icons/tiktok.svg" alt="" aria-hidden="true"><span class="sr-only">TikTok</span></a>
      <a href="https://youtube.com/@elevatedbeautybycrystal" target="_blank" rel="noopener" aria-label="YouTube"><img src="/assets/icons/youtube.svg" alt="" aria-hidden="true"><span class="sr-only">YouTube</span></a>
    </nav>
    <div class="note">Elevated Beauty By Crystal • Desert Hot Springs, California</div>
  </main>
</body>
</html>
